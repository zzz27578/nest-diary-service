<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>媒体 - 小窝</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <main class="dashboard">
    <nav class="crumb"><a href="/">小窝</a><span>/</span><strong>媒体</strong></nav>
    <h1>媒体证据</h1>
    {% if manifests %}
    {% for manifest in manifests %}
    <section class="section">
      <h2>{{ manifest.date }}</h2>
      <div class="list">
        {% for asset in manifest.assets %}
        <div class="row">
          <span>{{ asset.original_name }}</span>
          <strong>{{ asset.sha256[:16] }}...</strong>
          <em>{{ asset.path }}</em>
        </div>
        {% endfor %}
      </div>
    </section>
    {% endfor %}
    {% else %}
    <p class="muted">还没有媒体归档。</p>
    {% endif %}
  </main>
</body>
</html>
