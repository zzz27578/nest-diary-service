<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>日记 - 小窝</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <main class="dashboard">
    <nav class="crumb"><a href="/">小窝</a><span>/</span><strong>日记</strong></nav>
    <h1>日记</h1>
    {% if entries %}
    <div class="list">
      {% for entry in entries %}
      <a class="row" href="/diary/{{ entry.date }}">
        <span>{{ entry.date }}</span>
        <strong>{{ entry.normalized_title() }}</strong>
        <em>{{ entry.tags | join(", ") }}</em>
      </a>
      {% endfor %}
    </div>
    {% else %}
    <p class="muted">还没有日记。</p>
    {% endif %}
  </main>
</body>
</html>
