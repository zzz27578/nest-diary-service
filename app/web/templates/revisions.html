<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>修订 - 小窝</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  {% from "_shell.html" import nav %}
  <main class="app-shell">
    {{ nav(active) }}
    <section class="workspace">
      <header class="page-head">
        <div>
          <p class="eyebrow">History</p>
          <h1>修订</h1>
        </div>
      </header>
      <section class="section">
        {% if revisions %}
        <div class="list">
          {% for item in revisions %}
          <div class="row">
            <span>{{ item.date }}</span>
            <strong>{{ item.name }}</strong>
            <em>{{ item.size }} bytes</em>
          </div>
          {% endfor %}
        </div>
        {% else %}
        <p class="muted">还没有修订记录。</p>
        {% endif %}
      </section>
    </section>
  </main>
</body>
</html>
